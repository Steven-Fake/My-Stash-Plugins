name: Jav Organizer
# requires: PythonDepManager
description: A plugin to organize some scenes by my own rules.
version: 1.0.1
exec:
  - python
  - "{pluginDir}/main.py"
interface: raw
tasks:
  - name: Add tags for Jav
    description: Extract the censored, subtitle status. / 从文件路径中提取修正状态、字幕状态并添加到元信息中
    defaultArgs:
      mode: jav_tags